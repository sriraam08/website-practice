      <!--Contact form Section-->
      <!--Normal form Section to get the information from user-->
      <div class="contact">
        <div class="contact-form">
            <h2>Enter your credentials</h2>
            <form action="database.php"><!--'action' is an attribute used within the <form> tag to specify where the form data should be sent when the form is submitted-->
                <!--A PHP file is a plain-text file that contains source code written in the PHP (Hypertext Preprocessor) scripting language and uses the .php file extension. 
                This code is executed on a web server to generate dynamic web content, such as HTML, which is then sent to the user's web browser. -->
                <!--uses XAMPP application which act as a local server to respond to the user action-->
                <label for="name">user name </label><!--The label 'for' and 'id' of input need to be same so that the label is created for that respensentative box-->
                <input type="text" id="name" name="name" value="***@gmail.com"></br> <!--there different type of input attributes -'text','radio','checkbox' and the 'id' & 'name' attributes need to have same name -->
                <label for="Password">Password </label>
                <input type="text" id="Password" name="password" value="#@!123ARd"><!--'valure' attribute is a prompt tool which help the user to identify what they need to type in the box-->
                <input type="submit"><!--this type 'submit' will create a button with submit written on it-->
      <!--'Radio' form Section used to select any one option from the user-->
            </form>
            <h2>Enter your fav food</h2>
            <form></br> 
                <label for="fav-food">pizza </label>
                <input type="Radio" id="fav-food" name="fav-food" value="pizza"></br> 
                <label for="fav-food">burger </label>
                <input type="Radio" id="fav-food" name="fav-food" value="burger"></br> 
                <input type="submit">
            </form>
    <!--'Checkbox' form Section used to select one or more option from the user-->
            <h2>Enter your fav f1 driver</h2>
            <form></br> 
                <label for="fav-driver">max </label>
                <input type="checkbox" id="fav-driver" name="fav-driver" value="max"></br> 
                <label for="fav-food">Verstappen </label>
                <input type="checkbox" id="fav-driver" name="fav-driver" value="Verstappen"></br> 
                <input type="submit">
            </form>
